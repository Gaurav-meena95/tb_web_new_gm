<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Firebase RealTime Chat</title>
		<link rel="stylesheet" href="./index.css" />
		<style>
			body {
				background-color: #f3f2f3;
				margin: 0;
				padding: 0;
			}

			header {
				text-align: center;
			}

			#messages {
				padding-bottom: 30%;
			}

			li {
				list-style-type: none;
				margin-bottom: 10px;
				background-color: #6929ca;
				padding: 5px;
				border-radius: 10px;
				color: white;
				width: 50%;
			}

			li span {
				font-style: italic;
				font-weight: bolder;
				color: #b5b0b9;
			}

			#chat {
				width: 80%;
				margin: auto;
			}

			#message-form {
				text-align: center;
				position: fixed;
				left: 0;
				bottom: 0;
				width: 100%;
				background-color: #b7b5b9;
			}

			input {
				width: 70%;
				height: 30px;
			}

			button {
				width: 25%;
				height: 38px;
			}

			.sent {
				text-align: right;
				background-color: #a79cb3;
				margin-left: 50%;
			}

			.sent span {
				margin-left: 5px;
				color: #6929ca;
			}
		</style>
	</head>
	<body>
		<header>
			<h2>Firebase RealTime Chat</h2>
		</header>

		<div id="chat">
			<!-- messages will display here -->
			<ul id="messages"></ul>

			<!-- form to send message -->
			<form id="message-form">
				<input id="message-input" type="text" />
				<button id="message-btn" type="submit">Send</button>
			</form>
		</div>
		<!-- scripts -->
		<script src="https://www.gstatic.com/firebasejs/8.2.1/firebase-app.js"></script>
		<script src="https://www.gstatic.com/firebasejs/8.2.1/firebase-database.js"></script>
		<script src="/view/assets/js/chat.js"></script>
	</body>
</html>
