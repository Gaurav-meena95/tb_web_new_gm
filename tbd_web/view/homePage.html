    <script>
		function guestMaster(state) {
			guestUser = false;

			if (state == 'set') {
				localStorage.setItem('isGuestUser', true);
			}
			else if (state == 'clean') {
				localStorage.removeItem('isGuestUser');
			}
			else {
				if (localStorage.getItem('isGuestUser')) {
					guestUser = true;

					if (!jQuery('#app').hasClass('guestUser')) {
						jQuery('#app').addClass('guestUser');
					}
				}
			}

			return guestUser;
		}
		function createPremiumCarousel(images, className) {
			// Create the carousel container
			let carouselContainer = document.createElement('div');
			carouselContainer.className = 'premium-carousel ' + className; ;

			// Create the carousel inner container
			let carouselInner = document.createElement('div');
			carouselInner.className = 'premium-carousel-inner';

			// Add images to the carousel
			images.forEach((imageSrc, index) => {
				let carouselItem = document.createElement('div');
				carouselItem.className = 'premium-carousel-item ' + className;
				if (index === 0) {
					carouselItem.classList.add('active');
				}

				let img = document.createElement('img');
				img.src = imageSrc;
				img.alt = `Slide ${index + 1}`;

				carouselItem.appendChild(img);
				carouselInner.appendChild(carouselItem);
			});

			carouselContainer.appendChild(carouselInner);

			// Create indicators
			let indicatorsContainer = document.createElement('div');
			indicatorsContainer.className = 'premium-carousel-indicators ' + className;

			images.forEach((_, index) => {
				let indicator = document.createElement('span');
				indicator.className = 'premium-carousel-indicator';
				if (index === 0) {
					indicator.classList.add('active');
				}
				indicatorsContainer.appendChild(indicator);
			});

			carouselContainer.appendChild(indicatorsContainer);

			return carouselContainer;
		}

		function startAutoSlide(length) {
			var carousel = document.querySelector('.premium-carousel');
			var items = document.querySelectorAll('.premium-carousel-item');
			let currentIndex = 0;

			function scrollToItem(index) {
				if (index >= 0 && index < items.length) {
					var itemWidth = items[index].offsetWidth;
					carousel.scrollTo({
						left: itemWidth * index,
						behavior: 'smooth'
					});
					currentIndex = index;
				}
			}

			// Scroll to the next item
			function scrollNext() {
				if (currentIndex < items.length - 1) {
					scrollToItem(currentIndex + 1);
				}
				else {
					scrollToItem(0); // Loop back to the first item
				}
			}

			// Scroll to the previous item
			function scrollPrev() {
				if (currentIndex > 0) {
					scrollToItem(currentIndex - 1);
				}
			}

			// Example: Automatically scroll to the next item every 3 seconds
			setInterval(scrollNext, 3000);
		}

		// Function to open a specific page
		function openSpecificPage(pageName) {
			var deviceType = isAndroid() ? 'android' : isIOS() ? 'ios' : isPwa() ? 'pwa' : 'web';
			
			window.open(`https://beatravelbuddy.com/${pageName}?app=${deviceType}`, '_self');
		}
		function openSpecificPageWithoutDevice(pageName) {
			
			window.open(`https://beatravelbuddy.com/${pageName}`, '_self');
		}
		
		// Handle Notifications
		function notificationMaster(data) {
			console.log('Notification Data', data);
			if (!isIOS()) {
				function escapeNestedJSON(jsonString) {
					return jsonString.replace(/"id":"({[^}]*})"/, (match, p1) => `"id":"${p1.replace(/"/g, '\\"')}"`);
				}
		
				let escapedData = escapeNestedJSON(data);
				let parsedData = JSON.parse(escapedData);
				data = JSON.parse(parsedData["id"].replace(/\\"/g, '"'));
			} else {
				data = JSON.parse(data.id);
			}
		
			console.log('Data after parsing', data, data.id, data.type);
		
			var pageMap = {
				'like': `post/${data.id}`,
				'engagementFind': 'add-find-post',
				'engagementShare': 'add-share-post',
				'premium': 'premium',
				'aibuddy': 'ai-plan-trip',
				'chat': 'chat',
				'group_chat': 'chat',
				'singleExperience': `experiences/${data.id}`
			};
			
			var pageType = pageMap[data.type];
		
			if (pageType) {
				if (data.type == 'like' || data.type == 'singleExperience') {
					openSpecificPageWithoutDevice(pageType);
				} 
				else {
					openSpecificPage(pageType);
				}
			}
		}
			
		function deepLinkMaster(url) {
			var queryParams = processUrl(url);
			var pageMap = {
				'postid': `post/${queryParams['t'] ? queryParams['t'].split('-')[1] : ''}`,
				'find': 'add-find-post',
				'share': 'add-share-post',
				'premium': 'premium',
				'aibuddy': 'ai-plan-trip',
				'chat': 'chat',
				'group_chat': 'chat',
				'singleExperience': `experiences/${queryParams['t'] ? queryParams['t'].split('-')[1] : ''}`,
				'groupTrips': 'groupTrips',
				'enquiryForm': 'check-deals-hotels-flights-packages',
				'search': 'search',
				'home': 'community'
			};
		
			for (var key in pageMap) {
				if (queryParams['t'].includes(key)) {
					if (key == 'singleExperience' || key == 'postid') {
						openSpecificPageWithoutDevice(pageMap[key]);
					} 
					else {
						openSpecificPage(pageMap[key]);
					}
					break;
				}
			}
		}
		
		function processUrl(url) {
			var query = {};
			var params = url.split('?')[1].split('&');
			params.forEach(param => {
				var [key, value] = param.split('=');
				query[key] = value;
			});
			console.log(query);
			return query;
		}
		
		// Defining the APP type
		function isIOS() {
			if (localStorage.getItem('isIOS') == 'true') {
				// alert('isIOS');
				return true;
			}
			else {
				return false;
			}
		}

		//Function to check if device is Android
		function isAndroid() {
			if (localStorage.getItem('isAndroid') == 'true') {
				return true;
			}
			else {
				return false;
			}
		}

		function isPwa() {
			if (localStorage.getItem('isPWA') == 'true') {
				return true;
			}
			else {
				return false;
			}
		}
		
		function setNotificationToken(data) {
			if (isAndroid()) {
				data = JSON.parse(data);
				localStorage.setItem('notificationToken', data.token);
				localStorage.setItem('vendorUUID', data.vendorUUID);
			}
			else if (isIOS()) {
				console.log(data);
				localStorage.setItem('vendorUUID', data.vendorUUID);
				localStorage.setItem('notificationToken', data.token);
			}
		}

			if (isAndroid() && !guestMaster()) {

			}
		}

		// on Dom loaded
		jQuery(document).ready(function() {
			
			
			function defineApp() {
				url = window.location.href;
				if (url.includes('?')) {
					url = url.split('#');
					url = url[0];

					queryParams = url.split('?');
					url = queryParams[0];
					queryParams = queryParams[1];

					queryParams = queryParams.split('&');
					//Convert the query parameters into an object
					queryArray = [];
					for (i = 0; i < queryParams.length; i++) {
						pushArr = {
							'name': queryParams[i].split('=')[0],
							'value': queryParams[i].split('=')[1]
						}
						queryArray.push(pushArr);
					}

					query = queryArray;

					query.forEach(element => {
						if (element['name'] == 'app') {
							if (element['value'].toLowerCase() == 'android') {
								localStorage.setItem('isAndroid', true);
								localStorage.setItem('isIOS', false);
								localStorage.setItem('isPWA', false);

								return false;
							}
							else if (element['value'].toLowerCase() == 'ios') {
								localStorage.setItem('isIOS', true);
								localStorage.setItem('isAndroid', false);
								localStorage.setItem('isPWA', false);

								return false;
							}
							else if (element['value'].toLowerCase() == 'pwa') {
								localStorage.setItem('isPWA', true);
								localStorage.setItem('isAndroid', false);
								localStorage.setItem('isIOS', false);

								return false;
							}
							else {
								localStorage.setItem('isAndroid', false);
								localStorage.setItem('isIOS', false);
								localStorage.setItem('isPWA', false);
							}
						}
					});
				}
				

				//For ios, we are hiding the initial image loads after the app starts loading
				if (isIOS() && window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.HideInitialImage){
